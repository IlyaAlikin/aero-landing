# Static serving for the generated Nuxt site (.output/public).
server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---- compression ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        application/xml
        font/woff2;

    # ---- long-lived, content-hashed assets ----
    location /_nuxt/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    location /fonts/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    location /img/ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }
    location = /favicon.svg {
        expires 30d;
        access_log off;
    }

    # ---- app routes: fall back to the prerendered index ----
    location / {
        try_files $uri $uri/ /index.html;
        # security headers (kept in the catch-all so HTML responses carry them)
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
    }
}
